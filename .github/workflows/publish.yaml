name: Publish package

on:
    release:
        types: [released, prereleased]

jobs:
    Test:
        runs-on: ubuntu-latest
        steps:
            - name: Setup Action
              uses: actions/checkout@v4

            - name: Setup PNPM
              uses: pnpm/action-setup@v4
              with:
                  version: "latest"

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "latest"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Run test
              run: node --run test

    Publish:
        runs-on: ubuntu-latest
        needs: Test
        permissions:
            contents: write
            id-token: write

        steps:
            - name: Setup Action
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "latest"
                  registry-url: https://registry.npmjs.org/
                  cache: "pnpm"

            - name: Setup PNPM
              uses: pnpm/action-setup@v4
              with:
                  version: "latest"

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Build
              run: node --run build

            - name: Create declaration
              run: echo "export {}" > out/index.d.ts

            - name: Sync version
              run: pnpm version --no-git-tag-version ${{ github.ref_name }}

            - name: Remove .gitignore
              run: rm -rf .gitignore

            - name: Format
              run: node --run fmt -- --no-color

            - name: Publish
              run: pnpm publish --provenance --no-git-checks --tag ${{ github.event.release.prerelease && 'beta' || 'latest' }}
